services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  form-agent:
    build: .
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data:
